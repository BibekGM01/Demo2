<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple Validated Form</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background: #ffffff;
            padding: 24px;
            border-radius: 10px;
            width: 380px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.15);
        }

        h2 {
            text-align: center;
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-top: 12px;
            font-weight: bold;
        }

        input,
        textarea,
        select,
        button {
            width: 100%;
            box-sizing: border-box;
            margin-top: 6px;
            padding: 10px;
            font-size: 14px;
        }

        input:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border: 2px solid #2563eb;
        }

        input:invalid,
        textarea:invalid,
        select:invalid {
            border: 2px solid #dc2626;
        }

        input:valid,
        textarea:valid,
        select:valid {
            border: 2px solid #16a34a;
        }

        .checkbox-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 14px;
            font-weight: normal;
        }

        .checkbox-row input {
            width: auto;
            margin: 0;
        }

        button {
            margin-top: 18px;
            border: none;
            background: #007bff;
            color: white;
            cursor: pointer;
            border-radius: 6px;
        }

        button:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Registration Form</h2>

        <form action="#" method="post">
            <label for="name">Full Name</label>
            <input
                type="text"
                id="name"
                name="name"
                placeholder="Enter your full name"
                required
                minlength="3"
                maxlength="30"
                pattern="[A-Za-z ]+"
                title="Only letters and spaces are allowed"
            />

            <label for="email">Email</label>
            <input
                type="email"
                id="email"
                name="email"
                placeholder="Enter your email"
                required
            />

            <label for="password">Password</label>
            <input
                type="password"
                id="password"
                name="password"
                placeholder="Enter a secure password"
                required
                minlength="8"
                pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}"
                title="Must contain at least 8 characters, one uppercase, one lowercase, and one number"
            />

            <label for="age">Age</label>
            <input
                type="number"
                id="age"
                name="age"
                placeholder="Enter your age"
                required
                min="18"
                max="60"
            />

            <label for="phone">Phone Number</label>
            <input
                type="tel"
                id="phone"
                name="phone"
                placeholder="Enter 10-digit phone number"
                required
                pattern="[0-9]{10}"
                title="Enter exactly 10 digits"
            />

            <label for="dob">Date of Birth</label>
            <input
                type="date"
                id="dob"
                name="dob"
                required
            />

            <label for="gender">Gender</label>
            <select id="gender" name="gender" required>
                <option value="">--Select Gender--</option>
                <option value="male">Male</option>
                <option value="female">Female</option>
                <option value="other">Other</option>
            </select>

            <label for="address">Address</label>
            <textarea
                id="address"
                name="address"
                rows="4"
                placeholder="Enter your address"
                required
                minlength="10"
                maxlength="200"
            ></textarea>

            <label class="checkbox-row">
                <input type="checkbox" name="terms" required />
                I agree to the terms and conditions
            </label>

            <button type="submit">Submit</button>
        </form>
    </div>
</body>
</html>
