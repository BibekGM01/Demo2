<!DOCTYPE html>
<html>
<head>
  <title>Document</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display:flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #ffffff, #ebffd4);
    }

    .container {
      width: 100%;
      max-width: 420px;
    }


    form {
      display: flex;
      flex-direction:column;
      background: #eaf5fb;
      padding: 28px;
      border-radius: 18px;
      box-shadow: 0 12px 30px rgba(15, 23, 42, 0.14);
    }
    
    h2 {
       text-align: center;
        margin-bottom: 18px;
        }

    label {
      display: block;
      margin-bottom: 8px;
      color: #1d3557;
      font-weight: 350;
    }

    input {
      width: 100%;
      box-sizing: border-box;
      padding: 12px 14px;
      margin-bottom: 13px;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    input:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
    }

    button {
      width: 100%;
      padding: 12px 16px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      color: #ffffff;
      font-weight: 700;
      background: linear-gradient(135deg, #3774f6, #4f46e5);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 18px rgba(37, 99, 235, 0.28);
    }
    .message{
      padding-bottom:50px;
    }
    .checkbox{
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 14px;
            font-weight: normal;
        }

        .checkbox input {
            width: auto;
            margin: 0;
        }

  </style>
</head>
<body>
  <div class="container">
    <form action="/submit-data" method="POST">
      <h2>Registration Form</h2>
      <label for="name">Name</label>
      <input type="text" placeholder="Enter your name" id="name" name="name" required>

      <label for="email">Email</label>
      <input type="email" placeholder="Enter your email" id="email" name="email" required>

      <label for="Password">Password</label>
      <input type="password" placeholder="Enter password" id="Password" name="Password" required>

      <label for="message">Message</label>
      <input class="message" type="text" placeholder="Input Message" id="message" name="message" required>
      <label class="checkbox">
      <input type="checkbox" id="checkbox" name="checkbox"/>I agree to Terms & Conditions.
</label>
      <button type="submit">Submit</button>
    </form>
  </div>
</body>
</html>
